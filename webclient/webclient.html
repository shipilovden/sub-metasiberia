<!doctype html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<title>Metasiberia Web Client</title>
		
		<style>
		#canvas {
			width:100%;
			height:100dvh; /* percentage of viewport height.  See https://www.frontend.fyi/tutorials/finally-a-fix-for-100vh-on-mobile */
			border: none;
			display: block; /* Needed to get rid of 4 pixel region under the canvas */
			background-color: transparent;
			
			position: absolute;
			top: 0;
			left: 0;
		}
		body {
			margin: 0;
			padding: 0;
		}
		#status {
			font-family: 'Arial', sans-serif;
			font-size: 1.5em;
			color: rgb(150, 150, 150); /* font colour */
			margin-left: auto;
			margin-right: auto;
			margin-top: 100px;
			padding: 20px;
			width: 30%;
			border: 2px solid rgb(150, 150, 150);
		}

		.background-div {
			width:100%;
			height:100dvh; /* percentage of viewport height.  See https://www.frontend.fyi/tutorials/finally-a-fix-for-100vh-on-mobile */
			border: none;
			display: block; /* Needed to get rid of 4 pixel region under the canvas */
			
			z-index: -1;
			/*z-index: -1;*/ /* TEMP WAS -1*/
			/*background-color: grey;*/
			position: absolute;
			top: 0;
			left: 0;
			
			overflow: hidden;
		}
		
		#iframe-container {
			border: solid red;
			transform-origin: top left;
			transform: translate3d(500px, 100px, 714px) scale3d(1, -1, 1) translate3d(0px, -400px, 0) scale3d(400, 400, 400) translate3d(0px, 0px, -2px) translate3d(0px, 1px, 0px) scale3d(1, -1, 1) scale3d(0.0025, 0.0025, 0.0025);
			
			/* model to world and world to cam */ 
			/*perspective:  500px;*/

			/*translate3d(0, 0, -2)*/
 
			width:  400px;
			height: 400px;
			background-color: green;
			font-size: 30px;
		}
		
		.transformable-html-view {
			/*border: solid red;*/
			transform-origin: top left;
			background-color: grey;
			width:  1024px;
			height: 576px;
			position: absolute; /* to prevent second and later divs being offset downwards */
			
			/*z-index: -1;*/
		}
		
		#iframe-container-camera {
			perspective:  714px;
			transform-style: preserve-3d; /* To make objects occlude each other properly in 3d */
			width:100%;
			height:100dvh; /* percentage of viewport height.  See https://www.frontend.fyi/tutorials/finally-a-fix-for-100vh-on-mobile */
		}

		#avatar-settings {
			visibility: hidden;
			position: absolute;
			z-index: -2;
			margin-left: 100px;
			margin-top: 100px;
			background-color: white;
			padding: 20px;
			
			line-height: 1.6;
			font-size: 18px;
			color: #222;
			font-family: Helvetica;
			margin-bottom: 40px;
		}
		
		#avatar-settings-form {
		}
		
		#avatar-settings-close-button {
			float: right;
			cursor: pointer;
			border-color: #959595;
			border-width: 1px;
			border-style: solid;
			width: 26px;
			height: 26px;
			align-items: center;
			justify-content: center;
			display: flex;
		}

		</style>
	</head>
	<body>
		<div id="status">downloading...</div>

		<div class="background-div" id="background-div">
			<div id="iframe-container-camera">
			</div>
		</div>

		<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

		<div class="avatar-settings" id="avatar-settings">
			<div id="avatar-settings-close-button">&times;</div>
			<h3>Avatar settings</h3>
			<form action="/set_avatar_model_post" id="avatar-settings-form" method="post">
				<label for="avatar">Choose a 3d model for your avatar:</label>
				<br/>
				<input type="file" id="avatar-model" name="avatar-model" accept=".gltf,.glb,.vrm,.bmesh"/>
				<br/>
				<button type="submit">Submit</button>
			</form>

		</div>

	<script type='text/javascript'>

		isNode = false; // To fix runtime error with new Emscripten

		var statusElement = document.getElementById('status');

		function forceWebclientGesturePanelVisible() {
			try
			{
				if(window.localStorage)
					window.localStorage.setItem("GestureUI/gestures_visible", "true");
			}
			catch(err)
			{
				console.warn("Failed to set default gesture panel visibility:", err);
			}
		}

		function installCriticalWebclientButtonSeeds(moduleRef) {
			if(!Array.isArray(moduleRef.preRun))
				moduleRef.preRun = moduleRef.preRun ? [moduleRef.preRun] : [];

			moduleRef.preRun.push(function metasiberiaSeedCriticalIcons() {
				try
				{
					if(typeof moduleRef.FS_createPath !== "function" ||
						typeof moduleRef.FS_createDataFile !== "function" ||
						typeof moduleRef.FS_unlink !== "function" ||
						typeof document === "undefined" ||
						typeof atob !== "function")
						return;

					moduleRef.FS_createPath("/", "data", true, true);
					moduleRef.FS_createPath("/data", "resources", true, true);
					moduleRef.FS_createPath("/data/resources", "buttons", true, true);

					const makePngBytesFromCanvas = (drawFn) => {
						const size = 256;
						const canvas = document.createElement("canvas");
						canvas.width = size;
						canvas.height = size;
						const ctx = canvas.getContext("2d");
						if(!ctx)
							return null;

						drawFn(ctx, size);

						const dataURL = canvas.toDataURL("image/png");
						const commaPos = dataURL.indexOf(",");
						if(commaPos < 0)
							return null;

						const base64 = dataURL.slice(commaPos + 1);
						const binary = atob(base64);
						const bytes = new Uint8Array(binary.length);
						for(let i = 0; i < binary.length; ++i)
							bytes[i] = binary.charCodeAt(i);
						return bytes;
					};

					const drawCircleButton = (ctx, size, innerDrawFn) => {
						const cx = size * 0.5;
						const cy = size * 0.5;
						const outerR = size * 0.485;
						const innerR = size * 0.44;

						ctx.clearRect(0, 0, size, size);

						ctx.fillStyle = "#eef2f7";
						ctx.beginPath();
						ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
						ctx.fill();

						ctx.fillStyle = "#273149";
						ctx.beginPath();
						ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
						ctx.fill();

						innerDrawFn(ctx, size);
					};

					const plusBytes = makePngBytesFromCanvas((ctx, size) => {
						drawCircleButton(ctx, size, (iconCtx, iconSize) => {
							iconCtx.strokeStyle = "#f6f8fb";
							iconCtx.lineCap = "round";
							iconCtx.lineWidth = iconSize * 0.11;

							const min = iconSize * 0.31;
							const max = iconSize * 0.69;
							const mid = iconSize * 0.5;

							iconCtx.beginPath();
							iconCtx.moveTo(min, mid);
							iconCtx.lineTo(max, mid);
							iconCtx.moveTo(mid, min);
							iconCtx.lineTo(mid, max);
							iconCtx.stroke();
						});
					});

					const webcamBytes = makePngBytesFromCanvas((ctx, size) => {
						drawCircleButton(ctx, size, (iconCtx, iconSize) => {
							iconCtx.fillStyle = "#f6f8fb";
							const bodyW = iconSize * 0.44;
							const bodyH = iconSize * 0.28;
							const bodyX = iconSize * 0.25;
							const bodyY = iconSize * 0.36;
							const radius = iconSize * 0.04;

							iconCtx.beginPath();
							iconCtx.moveTo(bodyX + radius, bodyY);
							iconCtx.lineTo(bodyX + bodyW - radius, bodyY);
							iconCtx.quadraticCurveTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + radius);
							iconCtx.lineTo(bodyX + bodyW, bodyY + bodyH - radius);
							iconCtx.quadraticCurveTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - radius, bodyY + bodyH);
							iconCtx.lineTo(bodyX + radius, bodyY + bodyH);
							iconCtx.quadraticCurveTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - radius);
							iconCtx.lineTo(bodyX, bodyY + radius);
							iconCtx.quadraticCurveTo(bodyX, bodyY, bodyX + radius, bodyY);
							iconCtx.fill();

							iconCtx.beginPath();
							iconCtx.moveTo(iconSize * 0.68, iconSize * 0.44);
							iconCtx.lineTo(iconSize * 0.84, iconSize * 0.36);
							iconCtx.lineTo(iconSize * 0.84, iconSize * 0.64);
							iconCtx.lineTo(iconSize * 0.68, iconSize * 0.56);
							iconCtx.closePath();
							iconCtx.fill();
						});
					});

					const writeIcon = (name, bytes) => {
						if(!bytes || bytes.length === 0)
							return;
						const targetPath = "/data/resources/buttons/" + name;
						try { moduleRef.FS_unlink(targetPath); } catch(e) {}
						moduleRef.FS_createDataFile("/data/resources/buttons", name, bytes, true, true, true);
					};

					writeIcon("plus.png", plusBytes);
					writeIcon("webcam.png", webcamBytes);
				}
				catch(err)
				{
					console.warn("Failed to seed critical webclient button icons:", err);
				}
			});
		}

		function installMetasiberiaButtonOverrides(moduleRef) {
			const buttonIcons = [
				// Keep override minimal and robust: files with spaces may 404 on current server URL decoding.
				// We only override D-pad to control size/placement in webclient.
				"dir_pad.png"
			];
			function processButtonIconBytes(iconName, bytes) {
				// For webclient only, shrink the visual size of the movement D-pad icon by 2x.
				if(iconName !== "dir_pad.png")
					return Promise.resolve(bytes);

				if(typeof createImageBitmap !== "function" || typeof document === "undefined")
					return Promise.resolve(bytes);

				return createImageBitmap(new Blob([bytes], { type: "image/png" }))
					.then(bitmap => {
						const canvas = document.createElement("canvas");
						canvas.width = bitmap.width;
						canvas.height = bitmap.height;
						const ctx = canvas.getContext("2d");
						if(!ctx)
							return bytes;

						const scaledW = Math.max(1, Math.floor(bitmap.width * 0.5));
						const scaledH = Math.max(1, Math.floor(bitmap.height * 0.5));
						const dstX = Math.floor((bitmap.width - scaledW) * 0.5);
						const dstY = Math.floor((bitmap.height - scaledH) * 0.95); // Push visual cross lower on screen.

						ctx.clearRect(0, 0, canvas.width, canvas.height);
						ctx.drawImage(bitmap, dstX, dstY, scaledW, scaledH);

						return new Promise(resolve => {
							canvas.toBlob(blob => {
								if(!blob)
								{
									resolve(bytes);
									return;
								}
								blob.arrayBuffer()
									.then(buffer => resolve(new Uint8Array(buffer)))
									.catch(() => resolve(bytes));
							}, "image/png");
						});
					})
					.catch(() => bytes);
			}

			const buttonsHash = "WEBCLIENT_BUTTONS_HASH";

			if(!Array.isArray(moduleRef.preRun))
				moduleRef.preRun = moduleRef.preRun ? [moduleRef.preRun] : [];

			const preRunArray = moduleRef.preRun;
			const originalPush = preRunArray.push.bind(preRunArray);
			let overridePreRunAdded = false;

			const addOverridePreRun = () => {
				if(overridePreRunAdded)
					return;
				overridePreRunAdded = true;

				originalPush(function metasiberiaButtonOverrides() {
					try
					{
						if(typeof moduleRef.addRunDependency !== "function" ||
							typeof moduleRef.removeRunDependency !== "function" ||
							typeof moduleRef.FS_createDataFile !== "function" ||
							typeof moduleRef.FS_unlink !== "function" ||
							typeof fetch !== "function")
							return;

						for(const iconName of buttonIcons)
						{
							const depId = "ms_btn_override_" + iconName.replace(/[^a-zA-Z0-9_]/g, "_");
							moduleRef.addRunDependency(depId);

							const encodedIconName = iconName.split('/').map(encodeURIComponent).join('/');
							const sourceURL = "/webclient/data/resources/buttons/" + encodedIconName + "?hash=" + buttonsHash;

							fetch(sourceURL, { cache: "no-store" })
								.then(response => {
									if(!response.ok)
										throw new Error("HTTP " + response.status + " for " + sourceURL);
									return response.arrayBuffer();
								})
								.then(buf => new Uint8Array(buf))
								.then(bytes => processButtonIconBytes(iconName, bytes))
								.then(bytes => {
									const targetPath = "/data/resources/buttons/" + iconName;

									try { moduleRef.FS_unlink(targetPath); } catch(e) {}

									moduleRef.FS_createDataFile("/data/resources/buttons", iconName, bytes, true, true, true);
								})
								.catch(err => {
									console.warn("Metasiberia icon override failed for", iconName, err);
								})
								.finally(() => {
									moduleRef.removeRunDependency(depId);
								});
						}
					}
					catch(err)
					{
						console.warn("Metasiberia icon override init failed:", err);
					}
				});
			};

			preRunArray.push = function(...args) {
				const result = originalPush(...args);

				for(const fn of args)
				{
					if(fn && fn.name === "runWithFS")
						addOverridePreRun();
				}

				return result;
			};

			for(const fn of preRunArray)
			{
				if(fn && fn.name === "runWithFS")
				{
					addOverridePreRun();
					break;
				}
			}
		}

		forceWebclientGesturePanelVisible();

		var Module = {
			print: (function() {})(),
			canvas: (() => {
				var canvas = document.getElementById('canvas');

				// As a default initial behavior, pop up an alert when webgl context is lost. To make your
				// application robust, you may want to override this behavior before shipping!
				// See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
				canvas.addEventListener("webglcontextlost", (e) => { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);

				return canvas;
			})(),
			setStatus: (text) => {
				//console.log("~~~~~~~setStatus: " + text + "~~~~~~~~~");
				statusElement.innerText = text;
			},
			totalDependencies: 0,
			monitorRunDependencies: (left) => {
				Module.totalDependencies = Math.max(Module.totalDependencies, left);
				Module.setStatus(left ? 'Preparing... (' + (Module.totalDependencies - left) + '/' + Module.totalDependencies + ')' : 'All downloads complete.');
			},
			calledRun: false,
			onRuntimeInitialized: () => {
				//console.log("~~~~~~~~~~~~~~~~ onRuntimeInitialized() ~~~~~~~~~~");
				statusElement.style.display = 'none';
			},
			locateFile: function (path, prefix) {
				// Update URLs with cache-busting suffixes
				//console.log("locateFile(): path: " + path + ", prefix: " + prefix)
				let suffix = ""
				if (path === "gui_client.data") {
					prefix = "/webclient/"; // make work if page is /visit/parcel/xx, which otherwise would request /visit/parcel/gui_client.data
					suffix = "?hash=GUI_CLIENT_DATA_HASH";
				}
				else if (path == "gui_client.wasm") {
					suffix = "?hash=GUI_CLIENT_WASM_HASH";
				}
				//console.log("Using suffix '" + suffix + "'");
				//console.log("returning path '" + prefix + path + suffix + "'...");
				return prefix + path + suffix;
			}
		};

		// NOTE: Don't pre-seed icons here. They are now packaged in gui_client.data,
		// and pre-creating the same files causes Emscripten preload ErrnoError (EEXIST).
		installMetasiberiaButtonOverrides(Module);

		Module.setStatus('Downloading...');

		window.onerror = (message, source, lineno, colno, error) => {
			Module.setStatus('Exception thrown: ' + message);

			Module.setStatus = (text) => {
				if (text) console.error('[post-exception status] ' + text);
			};
		};


		var next_html_view_elem_handle = 1;
		var html_view_elem_handle_to_div_map = {};
		var youtube_iframe_API_ready = false;

		function onYouTubeIframeAPIReady() {
			console.log("****************onYouTubeIframeAPIReady()*************************");
			youtube_iframe_API_ready = true;
		}

		var move_background_timer_id = null;
		
		let background_div = document.getElementById('background-div');
		background_div.addEventListener('mousedown', function(e) {
			console.log("background mousedown event, moving background back to background...");
			background_div.style.zIndex = -1; 
		});

		function showAvatarSettingsWidget() {
			let avatar_settings_div = document.getElementById('avatar-settings');
			avatar_settings_div.style.visibility = "visible";
			avatar_settings_div.style.zIndex = 200; 
		}

		function hideAvatarSettingsWidget() {
			let avatar_settings_div = document.getElementById('avatar-settings');
			avatar_settings_div.style.visibility = "hidden";
			avatar_settings_div.style.zIndex = -2; 
		}

		const avatar_settings_form = document.getElementById('avatar-settings-form');

		avatar_settings_form.addEventListener('submit', async (e) => {
			e.preventDefault(); // Prevent default form submission
			
			const formData = new FormData(avatar_settings_form);
			
			for (let [key, value] of formData.entries()) {
				if(key === "avatar-model") {
					console.assert(value instanceof File);
					const array_buffer = await value.arrayBuffer();
					const uint8Array = new Uint8Array(array_buffer);

					// Allocate memory in Emscripten heap
					const dataPtr = Module._malloc(uint8Array.length);
					Module.HEAPU8.set(uint8Array, dataPtr);

					// Call C++ function with pointer
					Module.ccall('processAvatarModelFile', 
						'null', // return type
						['number', 'number', 'string'],   // argument types
						[dataPtr, uint8Array.length, value.name]);// arguments
				
					// Clean up memory
					Module._free(dataPtr);
				}
			}
			
			hideAvatarSettingsWidget();
		});
		
		const avatar_settings_close_button = document.getElementById('avatar-settings-close-button');
		
		avatar_settings_close_button.addEventListener('click', function(e) {
			hideAvatarSettingsWidget();
		});
		
		// showAvatarSettingsWidget();
		
	</script>

	<script async type="text/javascript" src="/webclient/gui_client.js?hash=GUI_CLIENT_JS_HASH"></script>

	</body>
</html>
